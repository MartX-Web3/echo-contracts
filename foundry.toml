[profile.default]
# Pin compiler to match our contract pragmas.
solc_version = "0.8.26"

optimizer = true
optimizer_runs = 200
via_ir = true

src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]

fs_permissions = [{ access = "read-write", path = "./" }]

[lint]
lint_on_build = false
